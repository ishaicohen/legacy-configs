name: Deploy docker-compose to VM

on:
  push:
    branches: [main]
    paths:
      - docker-compose.yml
      - configs/**
      - etl_server.cfg
      - luascripts/**
      - mapscripts/**
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if docker-compose.yml changed
        id: changes
        if: github.event_name == 'push'
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^docker-compose\.yml$'; then
            echo "compose_changed=true" >> $GITHUB_OUTPUT
          else
            echo "compose_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy docker-compose.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/etlegacy/
          overwrite: true

      - name: Restart containers (image or schedule update)
        if: github.event_name != 'push' || steps.changes.outputs.compose_changed == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/etlegacy
            docker compose pull
            docker compose up -d

      - name: Restart containers (config files changed)
        if: github.event_name == 'push' && steps.changes.outputs.compose_changed == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/etlegacy
            docker compose stop enemyterritory-public
            docker compose up -d enemyterritory-public
