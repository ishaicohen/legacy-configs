name: Sync upstream

on:
  schedule:
    # Runs every day at 06:00 UTC — adjust as needed
    - cron: '0 6 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch upstream and push sync branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add upstream https://github.com/Oksii/legacy-configs.git
          git fetch upstream

          # Base the sync branch on OUR main, not upstream/main.
          # This means only one new commit is pushed — GitHub won't see
          # upstream's raw commits (which contain their workflow files).
          git checkout -B upstream-sync origin/main

          # Merge upstream changes without committing yet
          git merge upstream/main --no-commit --no-ff --allow-unrelated-histories || true

          # Wipe any .github/ that came from upstream, restore only ours
          git rm -rf .github/ 2>/dev/null || true
          git checkout origin/main -- .github/

          git diff --cached --quiet && echo "Already up to date." && exit 0
          git commit -m "chore: sync upstream changes"
          git push origin upstream-sync --force

      - name: Open PR if upstream has new commits
        run: |
          # Count commits upstream has that main doesn't
          NEW=$(git log origin/main..upstream/main --oneline | wc -l)
          if [ "$NEW" -eq "0" ]; then
            echo "Already up to date, no PR needed."
            exit 0
          fi
          # Create the PR, or do nothing if it already exists
          gh pr create \
            --base main \
            --head upstream-sync \
            --title "chore: sync upstream Oksii/legacy-configs" \
            --body "Automated sync from [Oksii/legacy-configs](https://github.com/Oksii/legacy-configs).

          Review the diff and merge only what you want to keep.
          If there are conflicts, resolve them in favour of your customisations." \
          || echo "PR already open, skipping."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
