name: Sync ETL Stats API Branch

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  sync-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all branches
        run: |
          git fetch origin
          git fetch origin etl-stats-api:etl-stats-api

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'

      - name: Sync changes
        run: |
          git checkout etl-stats-api

          # Phase 1: save lua_modules lines from etl-stats-api before merge
          mkdir -p /tmp/lua_modules_backup
          for f in configs/*.config; do
            [ -f "$f" ] || continue
            line=$(grep "^[[:space:]]*setl[[:space:]]*lua_modules" "$f" 2>/dev/null || true)
            [ -n "$line" ] && printf '%s' "$line" > "/tmp/lua_modules_backup/$(basename "$f")"
          done

          git checkout -b temp-sync-branch

          # Phase 2: merge main, resolving all conflicts by taking theirs
          if ! git merge origin/main -m "Sync: Merge changes from main branch"; then
            echo "Merge conflicts detected. Resolving by taking main's version..."
            while IFS= read -r file; do
              git checkout --theirs "$file"
              git add "$file"
            done < <(git diff --name-only --diff-filter=U)
            git commit -m "Sync: Merge changes from main branch (with conflict resolution)"
          fi

          # Phase 3: restore lua_modules lines (runs unconditionally after merge)
          any_restored=false
          for f in configs/*.config; do
            [ -f "$f" ] || continue
            backup="/tmp/lua_modules_backup/$(basename "$f")"
            [ -f "$backup" ] || continue
            python3 - "$f" "$backup" << 'PYEOF'
          import sys, re
          config_path, backup_path = sys.argv[1], sys.argv[2]
          with open(backup_path) as b:
              original = b.read().rstrip('\n')
          with open(config_path) as f:
              lines = f.readlines()
          lua_re = re.compile(r'^\s*setl\s+lua_modules')
          if any(lua_re.match(l) for l in lines):
              lines = [original + '\n' if lua_re.match(l) else l for l in lines]
          else:
              comment_re = re.compile(r'disable wolfadmin|enable custom Lua', re.IGNORECASE)
              new_lines = []
              for l in lines:
                  new_lines.append(l)
                  if comment_re.search(l):
                      new_lines.append(original + '\n')
              lines = new_lines
          with open(config_path, 'w') as f:
              f.writelines(lines)
          PYEOF
            git add "$f"
            any_restored=true
          done

          if [ "$any_restored" = true ] && ! git diff --cached --quiet; then
            git commit -m "Preserve lua_modules settings for etl-stats-api branch"
          fi

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git push origin temp-sync-branch:etl-stats-api --force

      - name: Cleanup
        if: always()
        run: |
          git checkout main || true
          git branch -D temp-sync-branch || true